<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chair Occupancy Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2E3B4E;
            --card-bg: #3F4C62;
            --input-bg: #2F3A4B;
            --gold: #D4AF37;
            --text-muted: #A0B0C0;
            --text-light: #E0E0E0;
            --text-dark: #2E3B4E;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .calculator-container {
            background-color: var(--card-bg);
            padding: 40px 40px 0;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-badge {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background-color: var(--input-bg);
            color: var(--gold);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .inputs-section {
            position: relative;
            padding-left: 56px;
        }

        /* Gold vertical timeline */
        .inputs-section::before {
            content: '';
            position: absolute;
            left: 23px;
            top: 28px;
            bottom: 28px;
            width: 2px;
            background-color: var(--gold);
            z-index: 0;
        }

        .input-group {
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .input-group:last-of-type {
            margin-bottom: 32px;
        }

        .label-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--gold);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            margin-left: -56px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: none;
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
            transition: box-shadow 0.2s ease;
        }

        input::placeholder {
            color: var(--text-muted);
            opacity: 0.8;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 1px var(--gold);
        }

        .input-wrapper {
            position: relative;
        }

        .capacity-display {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .result-box {
            margin: 0 -40px;
            padding: 24px 40px 32px;
            background-color: var(--card-bg);
            border: 2px solid var(--gold);
            border-bottom: none;
            border-radius: 0 0 20px 20px;
            margin-top: 8px;
        }

        .result-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .result-value {
            color: var(--gold);
            font-size: 2.25rem;
            font-weight: 700;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body>

    <div class="calculator-container">
        <div class="header">
            <div class="logo-badge">C</div>
            <h1>Occupancy Calculator</h1>
            <div class="subtitle">For Dental Practices</div>
        </div>

        <div class="inputs-section">
        <!-- Number of Surgeries -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">S</div>
                <label>Number of Surgeries</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="surgeries" placeholder="e.g. 3" min="1" oninput="calculate()">
            </div>
        </div>

        <!-- Daily Hours -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">H</div>
                <label>Avg. Daily Opening Hours</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="hours" placeholder="e.g. 8" min="1" oninput="calculate()">
            </div>
        </div>

        <!-- Days Per Week -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">D</div>
                <label>Days Open Per Week</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="days" placeholder="e.g. 5" min="1" max="7" oninput="calculate()">
            </div>
            <div class="capacity-display" id="capacity-display">Weekly Capacity: 0 hours</div>
        </div>

        <!-- Clinical Hours Used -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">U</div>
                <label>Average Weekly Clinical Hours</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="used" placeholder="e.g. 120" min="0" oninput="calculate()">
            </div>
        </div>

        </div>

        <div class="result-box">
            <div class="result-label">Chair Occupancy Rate</div>
            <div class="result-value" id="result">0.00%</div>
        </div>
    </div>

    <script>
        function calculate() {
            // Get values
            const surgeries = parseFloat(document.getElementById('surgeries').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const days = parseFloat(document.getElementById('days').value) || 0;
            const used = parseFloat(document.getElementById('used').value) || 0;

            // Calculate Weekly Capacity
            const weeklyCapacity = surgeries * hours * days;

            // Update Capacity Display
            document.getElementById('capacity-display').innerText = `Weekly Capacity: ${weeklyCapacity.toLocaleString()} hours`;

            // Calculate Percentage
            let percentage = 0;
            if (weeklyCapacity > 0) {
                percentage = (used / weeklyCapacity) * 100;
            }

            // Update Result
            document.getElementById('result').innerText = percentage.toFixed(2) + '%';
        }
    </script>
</body>

</html>
