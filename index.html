<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chair Occupancy Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1f2b;
            --card-bg: #1f2533;
            --text-color: #ffffff;
            --gold-accent: #c5a059;
            --gold-hover: #d4b06a;
            --input-bg: #2a3142;
            --input-border: #3b4459;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-accent);
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #8b9bb4;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        /* Vertical line connector effect */
        .input-group:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 24px;
            top: 50px;
            bottom: -30px;
            width: 1px;
            background-color: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        .input-group:last-of-type {
            margin-bottom: 40px;
        }

        .label-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--gold-accent);
            color: var(--gold-accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: bold;
            margin-right: 16px;
            background-color: var(--card-bg);
            flex-shrink: 0;
        }

        label {
            font-size: 0.9rem;
            color: #a0aec0;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
            padding-left: 80px;
            /* Space for alignment with label text */
        }

        input:focus {
            outline: none;
            border-color: var(--gold-accent);
        }

        /* Helper to align input text with label text visually */
        .input-wrapper {
            position: relative;
            margin-left: 0;
        }

        .result-box {
            background: linear-gradient(135deg, var(--gold-accent), #a38243);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
            margin-top: 20px;
        }

        .result-label {
            color: #3e2c0a;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .result-value {
            color: #1a1f2b;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .capacity-display {
            font-size: 0.85rem;
            color: #64748b;
            text-align: right;
            margin-top: 6px;
            font-style: italic;
        }

        /* Remove number spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body>

    <div class="calculator-container">
        <h1>Occupancy Calculator</h1>
        <div class="subtitle">For Dental Practices</div>

        <!-- Number of Surgeries -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">S</div>
                <label>Number of Surgeries</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="surgeries" placeholder="e.g. 3" min="1" oninput="calculate()">
            </div>
        </div>

        <!-- Daily Hours -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">H</div>
                <label>Avg. Daily Opening Hours</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="hours" placeholder="e.g. 8" min="1" oninput="calculate()">
            </div>
        </div>

        <!-- Days Per Week -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">D</div>
                <label>Days Open Per Week</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="days" placeholder="e.g. 5" min="1" max="7" oninput="calculate()">
            </div>
            <div class="capacity-display" id="capacity-display">Weekly Capacity: 0 hours</div>
        </div>

        <!-- Clinical Hours Used -->
        <div class="input-group">
            <div class="label-row">
                <div class="icon-circle">U</div>
                <label>Average Weekly Clinical Hours</label>
            </div>
            <div class="input-wrapper">
                <input type="number" id="used" placeholder="e.g. 120" min="0" oninput="calculate()">
            </div>
        </div>

        <div class="result-box">
            <div class="result-label">Chair Occupancy Rate</div>
            <div class="result-value" id="result">0.00%</div>
        </div>
    </div>

    <script>
        function calculate() {
            // Get values
            const surgeries = parseFloat(document.getElementById('surgeries').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const days = parseFloat(document.getElementById('days').value) || 0;
            const used = parseFloat(document.getElementById('used').value) || 0;

            // Calculate Weekly Capacity
            const weeklyCapacity = surgeries * hours * days;

            // Update Capacity Display
            document.getElementById('capacity-display').innerText = `Weekly Capacity: ${weeklyCapacity.toLocaleString()} hours`;

            // Calculate Percentage
            let percentage = 0;
            if (weeklyCapacity > 0) {
                percentage = (used / weeklyCapacity) * 100;
            }

            // Update Result
            document.getElementById('result').innerText = percentage.toFixed(2) + '%';
        }
    </script>
</body>

</html>
